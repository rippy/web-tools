<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Text</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 520px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #212529;
    }
    a.back { color: #0070f3; text-decoration: none; font-size: 0.9rem; }
    a.back:hover { text-decoration: underline; }
    h1 { margin: 0.5rem 0 1.5rem; }

    textarea {
      width: 100%;
      min-height: 160px;
      padding: 0.5rem;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      margin-bottom: 0.75rem;
    }
    .btn-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    button {
      flex: 1;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 4px;
      background: #0070f3;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
    }
    button:hover { background: #005fd1; }

    .history-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-top: 1px solid #dee2e6;
      padding-top: 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
      color: #495057;
    }
    .history-header label { display: flex; align-items: center; gap: 0.4rem; margin-left: auto; }
    .history-header input[type=number] {
      width: 4rem;
      padding: 0.2rem 0.4rem;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: inherit;
    }

    .history-entry {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid #f1f3f5;
      font-size: 0.9rem;
    }
    .history-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #343a40;
    }
    .btn-secondary {
      flex: none;
      padding: 0.2rem 0.5rem;
      border: 1px solid #ced4da;
      border-radius: 4px;
      background: #fff;
      color: #495057;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-secondary:hover { background: #f8f9fa; }
  </style>
</head>
<body>
  <a class="back" href="../../index.html">← Back to Tools</a>
  <h1>Flip Text</h1>

  <textarea id="input-text" placeholder="Type or paste text here…"></textarea>

  <div class="btn-row">
    <button id="btn-flip">Flip Upside-Down</button>
    <button id="btn-reverse">Reverse</button>
  </div>

  <div class="history-header">
    <span>History</span>
    <label>
      Max: <input type="number" id="input-limit" min="1" value="5">
    </label>
  </div>
  <div id="history-list"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
