<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      var s=JSON.parse(localStorage.getItem('web-tools.settings')||'null')||{};
      var dark=s.theme==='dark'||(s.theme!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches);
      document.documentElement.setAttribute('data-theme',dark?'dark':'light');
      document.documentElement.style.setProperty('--font-family',s.font==='monospace'?"'Courier New',monospace":'system-ui,sans-serif');
      document.documentElement.style.setProperty('--font-size',(s.fontSize||16)+'px');
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="../../common/theme.css">
  <title>Achoo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: var(--font-family);
      background: var(--color-bg);
      color: var(--color-text);
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* Top bar */
    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }
    #top-bar a {
      color: var(--color-link);
      text-decoration: none;
      font-size: 0.85rem;
    }
    #top-bar a:hover { text-decoration: underline; }
    #top-bar .title { font-size: 0.9rem; font-weight: 600; }
    #btn-refresh {
      background: none;
      border: none;
      color: var(--color-link);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      line-height: 1;
    }
    #btn-refresh:disabled { color: var(--color-text-secondary); cursor: default; }

    /* Content area */
    #content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* Location strip (shared across layouts) */
    .location-strip {
      padding: 0.4rem 0.85rem;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface-alt);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .location-name { font-size: 0.75rem; font-weight: 600; }
    .location-meta { font-size: 0.65rem; color: var(--color-text-secondary); margin-top: 0.1rem; }
    .home-badge {
      font-size: 0.6rem;
      color: var(--color-accent-blue-text);
      background: var(--color-accent-blue-bg);
      border: 1px solid var(--color-accent-blue-border);
      border-radius: 3px;
      padding: 0.1rem 0.35rem;
      cursor: pointer;
      white-space: nowrap;
    }

    /* Weather hero */
    .weather-hero {
      background: var(--color-accent-blue-bg);
      padding: 0.75rem 0.85rem;
    }
    .weather-temp { font-size: 2.4rem; font-weight: 300; line-height: 1; margin: 0.3rem 0 0.1rem; }
    .weather-desc { font-size: 0.8rem; color: var(--color-text-muted); }
    .weather-stats {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 0.4rem;
      font-size: 0.7rem;
      color: var(--color-text-secondary);
    }

    /* Section headers */
    .section-header {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-secondary);
      margin-bottom: 0.4rem;
    }

    /* AQI section */
    .aqi-section { padding: 0.65rem 0.85rem; border-bottom: 1px solid var(--color-border); }
    .aqi-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      margin-top: 0.15rem;
    }
    .aqi-number {
      color: white;
      border-radius: 5px;
      padding: 0.2rem 0.55rem;
      font-weight: 700;
      font-size: 1.15rem;
      min-width: 2.6rem;
      text-align: center;
    }
    .aqi-label { font-weight: 600; font-size: 0.8rem; }
    .aqi-sublabel { font-size: 0.65rem; color: var(--color-text-secondary); }

    /* Allergen section */
    .allergen-section { padding: 0.65rem 0.85rem; }
    .allergen-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.2rem 0;
    }
    .allergen-name { font-size: 0.75rem; }
    .allergen-badge {
      font-size: 0.65rem;
      font-weight: 600;
      border-radius: 4px;
      padding: 0.12rem 0.45rem;
      white-space: nowrap;
    }

    /* Tabs layout */
    .tab-bar {
      display: flex;
      border-bottom: 2px solid var(--color-border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 0.5rem 0.25rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-family: inherit;
      font-size: 0.72rem;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: color 0.1s;
    }
    .tab-btn.active { color: var(--color-btn-primary); border-bottom-color: var(--color-btn-primary); font-weight: 600; }

    /* States */
    .state-box {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 0.9rem;
    }
    .state-error { color: var(--color-error); }
    .state-link { color: var(--color-link); cursor: pointer; background: none; border: none; font-family: inherit; font-size: inherit; padding: 0; }
  </style>
</head>
<body>
  <div id="app">
    <div id="top-bar">
      <a href="../../index.html">← Home</a>
      <span class="title">Achoo</span>
      <button id="btn-refresh" aria-label="Refresh">↺</button>
    </div>
    <div id="content"></div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
