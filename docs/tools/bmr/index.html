<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      var s=JSON.parse(localStorage.getItem('web-tools.settings')||'null')||{};
      var dark=s.theme==='dark'||(s.theme!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches);
      document.documentElement.setAttribute('data-theme',dark?'dark':'light');
      document.documentElement.style.setProperty('--font-family',s.font==='monospace'?"'Courier New',monospace":'system-ui,sans-serif');
      document.documentElement.style.setProperty('--font-size',(s.fontSize||16)+'px');
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../common/theme.css">
  <title>BMR Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--font-family);
      max-width: 520px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: var(--color-text);
      background: var(--color-bg);
    }
    a.back { color: var(--color-link); text-decoration: none; font-size: 0.9rem; }
    a.back:hover { text-decoration: underline; }
    h1 { margin: 0.5rem 0 1.5rem; }

    section { border: 1px solid var(--color-border); border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
    .section-header {
      background: var(--color-surface);
      padding: 0.6rem 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .section-header.blue  { background: var(--color-accent-blue-bg); color: var(--color-accent-blue-text); }
    .section-header.purple { background: var(--color-accent-purple-bg); color: var(--color-accent-purple-text); }
    .section-header.green  { background: var(--color-accent-green-bg); color: var(--color-accent-green-text); }
    .section-body { padding: 0.9rem; display: flex; flex-direction: column; gap: 0.65rem; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .field-label {
      display: block;
      font-size: 0.7rem;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
      letter-spacing: 0.03em;
    }
    input[type=number], select {
      width: 100%;
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--color-border-input);
      border-radius: 4px;
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--color-input-bg);
      color: var(--color-text);
    }
    .toggle-group { display: flex; gap: 0.3rem; }
    .toggle-btn {
      flex: 1;
      padding: 0.35rem;
      border: 1px solid var(--color-border-input);
      border-radius: 4px;
      background: var(--color-surface-alt);
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .toggle-btn.selected {
      background: var(--color-accent-blue-bg);
      border-color: var(--color-btn-primary);
      color: var(--color-accent-blue-text);
      font-weight: 600;
    }
    .btn-primary {
      width: 100%;
      padding: 0.45rem;
      background: var(--color-btn-primary);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
    }
    .btn-primary:hover { background: var(--color-btn-primary-hover); }
    .btn-small {
      padding: 0.25rem 0.8rem;
      background: var(--color-btn-primary);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
    }
    .btn-units {
      font-size: 0.72rem;
      background: var(--color-surface);
      border: none;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      color: var(--color-text-muted);
      font-family: inherit;
    }
    .result-row { display: flex; justify-content: space-between; align-items: center; }
    .result-label { color: var(--color-text-muted); font-size: 0.9rem; }
    .result-value { font-size: 1.1rem; font-weight: 700; color: var(--color-accent-blue-text); }
    .result-divider { border-top: 1px solid var(--color-accent-blue-border); padding-top: 0.5rem; margin-top: 0.25rem; }
    .ft-in-row { display: flex; gap: 0.3rem; }
    .ft-in-row input { width: 50%; }
    .ft-in-labels { display: flex; justify-content: space-around; font-size: 0.7rem; color: var(--color-text-secondary); margin-top: 0.15rem; }
    .projection-box {
      background: var(--color-accent-purple-bg);
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      font-size: 0.88rem;
    }
    .history-list { list-style: none; padding: 0; margin: 0; }
    .history-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--color-accent-green-bg);
      font-size: 0.85rem;
      gap: 0.5rem;
    }
    .history-row:last-child { border-bottom: none; }
    .history-date { color: var(--color-text-muted); white-space: nowrap; }
    .history-values { flex: 1; text-align: center; }
    .btn-delete { background: none; border: none; color: var(--color-delete); cursor: pointer; font-size: 0.9rem; padding: 0; }
    .empty-msg { color: var(--color-text-secondary); font-size: 0.9rem; font-style: italic; margin: 0; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <a class="back" href="../../index.html">← Home</a>
  <h1>BMR Calculator</h1>

  <!-- Profile section -->
  <section id="section-profile">
    <div class="section-header">
      <span>Your Profile</span>
      <button id="btn-units" class="btn-units">Switch to Imperial</button>
    </div>
    <div class="section-body">
      <div class="field-row">
        <div>
          <span class="field-label">Biological Sex</span>
          <div class="toggle-group">
            <button id="btn-male" class="toggle-btn">Male</button>
            <button id="btn-female" class="toggle-btn">Female</button>
          </div>
        </div>
        <div>
          <label class="field-label" for="input-age">Age</label>
          <input id="input-age" type="number" min="1" max="120" placeholder="35">
        </div>
      </div>

      <div class="field-row">
        <div>
          <span id="label-weight-metric" class="field-label">Weight (kg)</span>
          <span id="label-weight-imperial" class="field-label" hidden>Weight (lbs)</span>
          <input id="input-weight" type="number" min="0" step="0.1" placeholder="80">
        </div>
        <div>
          <div id="height-metric">
            <label class="field-label" for="input-height-cm">Height (cm)</label>
            <input id="input-height-cm" type="number" min="0" step="0.1" placeholder="178">
          </div>
          <div id="height-imperial" hidden>
            <span class="field-label">Height</span>
            <div class="ft-in-row">
              <input id="input-ft" type="number" min="0" max="9" placeholder="5">
              <input id="input-in" type="number" min="0" max="11" placeholder="11">
            </div>
            <div class="ft-in-labels"><span>ft</span><span>in</span></div>
          </div>
        </div>
      </div>

      <button id="btn-calculate" class="btn-primary">Calculate BMR</button>
    </div>
  </section>

  <!-- Results section (hidden until Calculate is clicked) -->
  <section id="section-results" hidden>
    <div class="section-header blue">Results</div>
    <div class="section-body">
      <div class="result-row">
        <span class="result-label">Basal Metabolic Rate</span>
        <span class="result-value"><span id="span-bmr">—</span> cal/day</span>
      </div>
      <div>
        <label class="field-label" for="select-activity">Activity Level</label>
        <select id="select-activity"></select>
      </div>
      <div class="result-row result-divider">
        <span class="result-label">Daily energy need (TDEE)</span>
        <span class="result-value"><span id="span-tdee">—</span> cal/day</span>
      </div>
      <div style="text-align:right">
        <button id="btn-save" class="btn-small">Save snapshot</button>
      </div>
    </div>
  </section>

  <!-- Goal Weight section -->
  <section>
    <div class="section-header purple">
      Goal Weight
      <span style="font-weight:400;font-size:0.8rem;color:#9c27b0">(optional)</span>
    </div>
    <div class="section-body">
      <div class="field-row">
        <div>
          <span id="label-target-metric" class="field-label">Target weight (kg)</span>
          <span id="label-target-imperial" class="field-label" hidden>Target weight (lbs)</span>
          <input id="input-target-weight" type="number" min="0" step="0.1" placeholder="75">
        </div>
        <div>
          <label class="field-label" for="input-deficit">Daily deficit (cal)</label>
          <input id="input-deficit" type="number" min="0" placeholder="500" value="500">
        </div>
      </div>
      <div id="div-projection" class="projection-box" hidden>
        <span id="span-projection"></span>
      </div>
    </div>
  </section>

  <!-- History section -->
  <section>
    <div class="section-header green">History</div>
    <div class="section-body">
      <p id="empty-history" class="empty-msg">No snapshots yet.</p>
      <ul id="list-history" class="history-list" hidden></ul>
    </div>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
