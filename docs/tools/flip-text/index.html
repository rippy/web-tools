<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      var s=JSON.parse(localStorage.getItem('web-tools.settings')||'null')||{};
      var dark=s.theme==='dark'||(s.theme!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches);
      document.documentElement.setAttribute('data-theme',dark?'dark':'light');
      document.documentElement.style.setProperty('--font-family',s.font==='monospace'?"'Courier New',monospace":'system-ui,sans-serif');
      document.documentElement.style.setProperty('--font-size',(s.fontSize||16)+'px');
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../common/theme.css">
  <title>Flip Text</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--font-family);
      max-width: 520px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: var(--color-text);
      background: var(--color-bg);
    }
    a.back { color: var(--color-link); text-decoration: none; font-size: 0.9rem; }
    a.back:hover { text-decoration: underline; }
    h1 { margin: 0.5rem 0 1.5rem; }

    textarea {
      width: 100%;
      min-height: 160px;
      padding: 0.5rem;
      border: 1px solid var(--color-border-input);
      border-radius: 4px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      margin-bottom: 0.75rem;
      background: var(--color-input-bg);
      color: var(--color-text);
    }
    .btn-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    button {
      flex: 1;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 4px;
      background: var(--color-link);
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
    }
    button:hover { background: var(--color-link-hover); }

    .history-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-top: 1px solid var(--color-border);
      padding-top: 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }
    .history-header label { display: flex; align-items: center; gap: 0.4rem; margin-left: auto; }
    .history-header input[type=number] {
      width: 4rem;
      padding: 0.2rem 0.4rem;
      border: 1px solid var(--color-border-input);
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: inherit;
      background: var(--color-input-bg);
      color: var(--color-text);
    }

    .history-entry {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--color-border);
      font-size: 0.9rem;
    }
    .history-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--color-text);
    }
    .btn-secondary {
      flex: none;
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--color-border-input);
      border-radius: 4px;
      background: var(--color-surface-alt);
      color: var(--color-text-muted);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      min-width: 5rem;
      text-align: center;
    }
    .btn-secondary:hover { background: var(--color-surface); }
    .btn-delete {
      flex: none;
      padding: 0.2rem 0.3rem;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 0.75rem;
      line-height: 1;
    }
    .btn-delete:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <a class="back" href="../../index.html">← Back to Tools</a>
  <h1>Flip Text</h1>

  <textarea id="input-text" placeholder="Type or paste text here…"></textarea>

  <div class="btn-row">
    <button id="btn-flip">↕️ Flip Upside-Down</button>
    <button id="btn-reverse">↔️ Reverse</button>
  </div>

  <div class="history-header">
    <strong>History</strong>
    <label>
      Max: <input type="number" id="input-limit" min="1" value="5">
    </label>
  </div>
  <div id="history-list"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
